name: "Nightly Documentation"

on:
  schedule:
    # Run at midnight UTC
    - cron: '0 0 * * *'
  workflow_dispatch:  # Allow manual triggering

jobs:
  build-and-deploy:
    runs-on: ubuntu-22.04
    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}
      cancel-in-progress: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Fetch all history for proper versioning

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install poetry
        run: make install-poetry

      - name: Install documentation dependencies
        run: make docs-install

      - name: Prepare nightly docs directory
        run: |
          mkdir -p mkdocs/docs/nightly
          cp -r mkdocs/docs/* mkdocs/docs/nightly/
          # Update version information
          sed -i 's/site_name: PyIceberg/site_name: PyIceberg (Nightly)/g' mkdocs/mkdocs.yml
          # Add build timestamp
          echo "<!-- Nightly build generated on $(date -u) -->" >> mkdocs/docs/nightly/index.md

      - name: Build documentation
        run: make docs-build

      - name: Copy built site
        run: mv ./mkdocs/site /tmp/site

      - name: Checkout gh-pages branch
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages
          fetch-depth: 1

      - name: Update nightly documentation
        run: |
          mkdir -p gh-pages/nightly
          rm -rf gh-pages/nightly/*
          cp -r /tmp/site/* gh-pages/nightly/
          
          # Create or update .nojekyll file to prevent GitHub Pages from ignoring files that start with underscores
          touch gh-pages/.nojekyll
          
          # Create a version indicator file
          echo "Nightly build generated on $(date -u)" > gh-pages/nightly/version.txt

      - name: Deploy to GitHub Pages
        working-directory: ./gh-pages
        run: |
          git config --global user.name 'GitHub Actions'
          git config --global user.email 'actions@github.com'
          git add --all
          
          # Only commit if there are changes
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update nightly documentation ($(date -u))"
            git push origin gh-pages
          fi

